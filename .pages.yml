          - name: description
            label: Описание для поисковиков
            type: text
            required: true
            options: { maxlength: 180 }

      - name: hero
        label: Первый экран
        type: object
        fields:
          - name: title
            label: Главный заголовок
            type: string
            required: true
            options: { maxlength: 50 }
          - name: text
            label: Описание
            type: text
            required: true
            options: { maxlength: 250 }
          - name: location
            label: Регион
            type: string
            required: true
          - name: image_title
            label: Заголовок на изображении
            type: text
            required: true
            options: { maxlength: 150 }
          - name: image
            label: Изображение
            type: image
            required: true
          - name: image_alt
            label: Описание изображения
            type: string
            required: true

      - name: cards_section
        label: Карточки услуг
        type: object
        fields:
          - name: title
            label: Заголовок секции
            type: string
            required: true
            options: { maxlength: 100 }
          - name: cards
            label: Услуги
            type: object
            list:
              min: 3
