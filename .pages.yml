            fields:
              - name: style
                label: Стиль
                type: string
                readonly: true
              - name: anchor
                label: Якорь
                type: string
                readonly: true
              - name: title
                label: Заголовок
                type: text
                required: true
                options: { maxlength: 120 }
              - name: text
                label: Описание
                type: text
                required: true
                options: { maxlength: 450 }
              - name: price
                label: Цена
                type: string
                required: true
                options: { maxlength: 50 }
              - name: image
                label: Изображение
                type: image
                required: true
              - name: image_alt
                label: Описание изображения
                type: string
                required: true

      - name: process
        label: Этапы проверки
        type: object
        fields:
          - name: title
            label: Заголовок
            type: string
            required: true
            options: { maxlength: 100 }
          - name: action
            label: Текст кнопки
            type: string
            required: true
          - name: steps
            label: Этапы
            component: numbered_card
            list:
              min: 4
              max: 4
              collapsible: { collapsed: true, summary: "{number}. {title}" }

      - name: express
        label: Экспресс-аудит
        type: object
        fields:
          - name: location
            label: Регион
            type: string
            required: true
          - name: title
            label: Главный заголовок
            type: text
            required: true
            options: { maxlength: 120 }
          - name: lead
            label: Текст на изображении
            type: text
            required: true
            options: { maxlength: 350 }
          - name: price
            label: Цена
            type: string
            required: true
          - name: image
            label: Изображение
            type: image
            required: true
          - name: image_alt
            label: Описание изображения
            type: string
            required: true
          - name: primary_action
            label: Главная кнопка
            type: string
            required: true
          - name: secondary_action
            label: Вторая кнопка
            type: string
            required: true
          - name: about_title
            label: Заголовок описания
            type: text
            required: true
            options: { maxlength: 120 }
          - name: about_paragraphs
            label: Описание услуги
            type: text
            list: { min: 2, max: 2 }
            options: { maxlength: 1000 }
          - name: advantages
            label: Преимущества
            component: numbered_card
            list:
              min: 4
              max: 4
              collapsible: { collapsed: true, summary: "{number}. {title}" }
          - name: form_title
            label: Заголовок формы
            type: text
            required: true
            options: { maxlength: 140 }
          - name: form_text
            label: Пояснение формы
            type: text
            required: true
            options: { maxlength: 220 }
          - name: form_action
            label: Кнопка формы
            type: string
            required: true
          - name: info_cards
            label: Информационные карточки
            type: object
            list:
              min: 4
              max: 4
              collapsible: { collapsed: true, summary: "{title}" }
            fields:
              - name: style
                label: Стиль
                type: string
                readonly: true
              - name: list_type
                label: Вид списка
                type: string
                readonly: true
              - name: title
                label: Заголовок
                type: text
                required: true
                options: { maxlength: 140 }
              - name: items
                label: Пункты
                type: string
                list: { min: 1, max: 12 }
                options: { maxlength: 250 }

      - name: full
        label: Полная экспертиза
        type: object
        fields:
          - name: location
            label: Регион
            type: string
            required: true
          - name: title
            label: Главный заголовок
            type: text
            required: true
            options: { maxlength: 120 }
          - name: lead
            label: Основной текст
            type: text
            required: true
            options: { maxlength: 350 }
          - name: price
            label: Цена
            type: string
            required: true
          - name: primary_action
            label: Главная кнопка
            type: string
            required: true
          - name: secondary_action
            label: Вторая кнопка
            type: string
            required: true
          - name: analysis_title
            label: Заголовок анализа
            type: text
            required: true
            options: { maxlength: 150 }
          - name: analysis_paragraphs
            label: Описание анализа
            type: text
            list: { min: 2, max: 2 }
            options: { maxlength: 1200 }
          - name: image
            label: Изображение
            type: image
            required: true
          - name: image_alt
            label: Описание изображения
            type: string
            required: true
          - name: scope_cards
            label: Что входит в экспертизу
            type: object
            list:
