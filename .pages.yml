      - name: urban
        label: Сопровождение проектов
        type: object
        fields:
          - name: location
            label: Регион
            type: string
            required: true
          - name: title
            label: Главный заголовок
            type: text
            required: true
            options: { maxlength: 150 }
          - name: lead
            label: Основной текст
            type: text
            required: true
            options: { maxlength: 450 }
          - name: price
            label: Цена
            type: string
            required: true
          - name: action
            label: Текст кнопки
